name: Scheduled Release & Version Bump

on:
  schedule:
    # Berjalan setiap hari Sabtu pukul 19:00 WIB (12:00 UTC)
    - cron: '0 12 * * 6'
  workflow_dispatch:
    # Memungkinkan pemicuan manual dari GitHub Actions UI jika diperlukan
    inputs:
      version:
        description: 'Versi target (misal: P-1.8 atau Prototype 1.8)'
        required: true
        default: 'P-1.8'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Configure Git Bot Credentials
        run: |
          git config --global user.name "Razael-Fox Bot"
          git config --global user.email "bot@razael-fox.my.id"

      - name: Merge dev into release
        run: |
          git checkout release
          git merge origin/dev --no-ff -m "chore(release): merge dev into release for scheduled deployment"

      - name: Set Custom Version
        run: |
          # Menggunakan aksi set custom version ke "P-1.8" (atau target input manual)
          node src/scripts/updateVersion.js set "${{ github.event.inputs.version || 'P-1.8' }}"
          
          git add VERSION package.json src/version.js
          git commit -m "chore(release): bump version to ${{ github.event.inputs.version || 'P-1.8' }}"

      - name: Push to Release Branch
        run: |
          git push origin release
